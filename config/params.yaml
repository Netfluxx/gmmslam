# =============================================================================
# GMM-SLAM parameter list
# =============================================================================

DEBUG_PRINTS: true  # false suppresses verbose INFO/DEBUG logs; WARN/ERROR stay visible

# ---------------------------------------------------------------------------
# ROS interface
# ---------------------------------------------------------------------------
ros:
  lidar_topic:  "/m500_1/mpa/depth/points"
  gt_topic:     "/m500_1/mavros/local_position/pose"
  imu_topic:    "/m500_1/mavros/imu/data"
  sensor_frame: "depth_camera_1"
  odom_frame:   "world"
  map_frame:    "map"
  base_frame:   "m500_1_base_link"
  odometry_input: "/gmmslam_node/ext_odom_pose"  # PoseStamped
  restart_state_path: ""  # latest odom pose for respawn recovery (empty disables)
  registration_request_topic: "/gmmslam_node/registration/request"
  registration_result_topic:  "/gmmslam_node/registration/result"

# ---------------------------------------------------------------------------
# Point-cloud pre-processing
# ---------------------------------------------------------------------------
preprocess:
  min_range:       0.3       # [m] discard near self-observations such as propellers
  max_range:       50.0      # [m] discard points farther than this
  voxel_leaf_size: 0.0       # [m] optional voxel centroid grid (0 = off); runs before target cap
  target_points:   4000     # if > 0, random subsample to at most this many points (after range+voxel)
  min_points:      100       # frames with fewer points after preprocess are skipped

# ---------------------------------------------------------------------------
# SOGMM fitting
# ---------------------------------------------------------------------------
sogmm:
  backend:      "gmmap"      # "sogmm" (default) or "gmmap" if built with GMMSLAM_USE_GMMAP
  bandwidth:    0.12         # [m] mean-shift bandwidth
  max_points:   4000         # downsample to at most this many points
  n_components: 0            # 0 = auto via mean-shift
  compute:      "GPU"        # "GPU" or "CPU"

gmmap:
  # Parameters following the TUM example.
  frame:
    dataset: "tum"
    occ_x_t: 10
    noise_thresh: 0.1
    sparse_t: 3
    ncheck_t: 16
    adaptive_thresh_scale: 1.2
    line_t: 0.2
    angle_t: 0.5
    noise_floor: 0.05
    num_line_t: 6
    num_pixels_t: 30
    max_incomplete_clusters: 20
    free_space_dist_scale: 1.0
    debug_row_idx: 240
  map:
    num_threads: 4
    measure_memory: false
    frame_alg_name: "spgf_extended"
    max_depth: 50.0
    hell_thresh_squard_oversized_gau: 0.5
    hell_thresh_squard_free: 0.1
    hell_thresh_squard_obs_scale: 8.0
    min_gau_len: 0.035
    frame_max_scale: 120.0
    min_num_neighbor_clusters: 4
    hell_thresh_squard_min: 0.1e-5
    gau_fusion_bd: 4.0
    gau_rtree_bd: 4.0
    depth_scale: 1.0
    track_color: false
    track_intensity: false
    cur_debug_frame: false
  adapter:
    # GMMap can drop far/depth-sparse occupied pixels. Supplement distant valid
    # depth with coarse Gaussian voxels so the fitted model covers sensor range.
    far_fill_enable: false
    far_fill_start_m: 6.0
    far_fill_voxel_m: 0.4
    far_fill_max_components: 250
    far_fill_skip_max_depth_margin_m: 0.5  # avoid Webots max-range no-return shell
    max_components: 220  # cap D2D cost; uncapped 400-600 component frames make stale factors
    # GMMap expects stable pinhole intrinsics. Estimating them from each point
    # cloud is fragile and can produce negative focal lengths / off-image centers.
    estimate_intrinsics: false
    horizontal_fov_deg: 120.0  # Webots RangeFinder depth_camera FOV ~= 2.0944 rad
    fx: 0.0    # <=0: derive from incoming cloud width and horizontal_fov_deg
    fy: 0.0    # <=0: use same focal length as fx
    cx: -1.0   # <0: derive from incoming cloud width
    cy: -1.0   # <0: derive from incoming cloud height

# ---------------------------------------------------------------------------
# Fixed-lag iSAM2 smoother
# ---------------------------------------------------------------------------
smoother:
  fixed_lag_s:       7.0     # [s] smoothing window
  smoother_stride:   1       # optimise every N frames
  enable_external_odometry_factor: false  # add odometry_input relative BetweenFactor; false leaves frame-to-frame D2D as the local motion factor
  odom_noise_sigma_t: 0.05   # [m] translation odometry noise
  odom_noise_sigma_r: 0.05 # [rad] rotation odometry noise
  lost_scale:        100.0    # multiplier on odom noise when tracking is lost
  prior_scale:       0.1     # multiplier on odom noise for the origin prior
  pose_history_keep: 999999    # max keyframes kept in pose history.

# ---------------------------------------------------------------------------
# D2D registration (async worker pool)
# ---------------------------------------------------------------------------
registration:
  enable_async:              true
  request_every_n_frames:    1
  factor_every_n_frames:     1
  score_threshold:           0.7
  strong_factor_score_threshold: 2.5
  strong_factor_sigma_t:     0.05
  strong_factor_sigma_r:     0.05
  queue_size:                7
  result_queue_size:         10
  enqueue_cooldown_frames:   8
  max_sequential_odom_gap:   30
  workers:                   3
  compensate_fit_latency:    true
  sequential_prior_gate_trans_m: 0.25  # reject D2D if it moves too far from smoother prior
  sequential_prior_gate_rot_deg: 15.0
  loop_prior_gate_trans_m:       30.0   # loop candidates have a looser SOLiD/global prior
  loop_prior_gate_rot_deg:       100.0
  # Score-to-sigma mapping: low score → high noise, high score → low noise
  score_sigma_low:           0.35
  score_sigma_high:          2.5
  # Sequential-frame registration noise bounds
  seq_sigma_t_min:           0.08
  seq_sigma_t_max:           0.25
  seq_sigma_r_min:           0.08
  seq_sigma_r_max:           0.25
  # Loop-closure registration noise bounds (wider max → more tolerant D2D)
  loop_sigma_t_min:          0.06
  loop_sigma_t_max:          0.5
  loop_sigma_r_min:          0.06
  loop_sigma_r_max:          0.5
  d2d:
    sequential:
      initial_score_fast_path: true
      initial_score_margin: 0.05
      coarse_max_iterations: 10
      fine_refine_enable: false
    loop:
      initial_score_fast_path: false
      coarse_max_iterations: 20
      fine_refine_enable: true
      fine_min_coarse_score: 0.5
    submap:
      initial_score_fast_path: true
      coarse_max_iterations: 20
      fine_refine_enable: true
      fine_min_coarse_score: 0.5
    objective_delta_stop: 1.0e-5
    initial_trust_radius: 2.0
    fine_objective_delta_stop: 1.0e-6
    fine_max_iterations: 4
    fine_initial_trust_radius: 0.25
    hessian_damping: 1.0e-3
    openmp_raw_score_enable: true
    openmp_min_pairs: 4096
    openmp_max_threads: 2
    openmp_timing_log_enable: true

# ---------------------------------------------------------------------------
# Loop-closure detection
# ---------------------------------------------------------------------------
loop_closure:
  enable:                     true  # keep loop D2D off until sequential D2D is stable
  search_radius_m:            5.0   # [m] spatial search radius
  min_keyframe_gap:           180    # skip local matches (~10 submaps at 10 keyframes/submap)
  max_candidates:             2     # max loop D2D requests dispatched per search
  request_every_n_keyframes:  1     # only run loop search when curr_idx % this == 0
  search_cooldown_keyframes:  20    # minimum keyframe/odom gap between loop searches
  min_separation_m:           0.2    # [m] translation gate
  min_separation_deg:         5.0   # [deg] paired with min_separation_m for diversity
  max_age_s:                  999999.0  # [s] ignore keyframes older than this
  gmm_keep_keyframes:         999999  # GMMs kept for loop-closure matching
  detect_score_threshold:     0.45  # accept loop if D2D score >= this
  super_sigma_t:              0.05   # noise for very confident loops
  super_sigma_r:              0.05
  consistency_gate_trans_m:   10.0    # reject D2D loops far from current pose estimate
  consistency_gate_rot_deg:   60.0

# ---------------------------------------------------------------------------
# SOLiD — spatially organized, lightweight global descriptor (Kim et al. 2024)
# Used as appearance-based gate on the radius loop search
# index + yaw prior for D2D. Tuned for a 120 deg horizontal FOV depth camera.
# ---------------------------------------------------------------------------
solid:
  enable:                     true
  fov_up_deg:                 30.0    # match the depth camera's vertical FOV
  fov_down_deg:              -30.0
  min_distance_m:             0.5
  max_distance_m:             50.0    # match preprocess.max_range
  num_angle:                  72      # 10° bins over 360° azimuth
  num_range:                  50      # radial bins
  num_height:                 16      # vertical bins across FOV
  voxel_size_m:               0.0     # extra coarse voxel (<=0 disables)
  cos_similarity_threshold:   0.97    # minimum range-cosine to pass the gate
  radius_weight:              0.55    # fused-score weight on radius term
  appearance_weight:          0.45    # fused-score weight on cosine term
  provide_yaw_prior:          true    # attach SOLiD yaw as T_init for D2D
  overlap_min:                0.22    # min non-zero-bin overlap for yaw search
  max_abs_yaw_deg:            100.0   # restrict shift search to |Δyaw| <= this
  yaw_sign:                   -1       # flip to -1 if empirical convention wrong
  rescue_enable:              true    # fallback loop candidate search when the normal radius-based SOLiD seach is not finding anything
  rescue_every_n_kf:          10      # throttle full-index rescue search
  rescue_trigger_silence_kf:  30      # trigger rescue after this many silent kf
  rescue_top_k:               3
  rescue_cos_threshold:       0.98
  keep_descriptors:           0       # 0 = follow gmm_keep_keyframes

# ---------------------------------------------------------------------------
# Keyframe triggers
# ---------------------------------------------------------------------------
keyframe:
  translation_thresh_m: 0.3
  rotation_thresh_deg:  5.0
  use_time_trigger:     false
  max_interval_s:       2.0   # [s] force keyframe after this long

# ---------------------------------------------------------------------------
# Global pose graph (submap level)
# ---------------------------------------------------------------------------
global_graph:
  enable:                        true
  submap_keyframes_per_submap:   10
  between_sigma_t:               0.1
  between_sigma_r:               0.1
  prior_sigma_t:                 0.02
  prior_sigma_r:                 0.02
  # Overlap candidate search: smaller radius = fewer (stricter) submap D2D requests.
  enable_overlap_d2d:            true # set false to skip expensive(since many gaussians) submap-overlap D2D jobs
  overlap_radius_m:              1.0 # only submaps with anchor positions within this distance will be considered fro D2D
  max_overlap_registrations:     1   # cap closest overlap D2D jobs per new submap to avoid queue floods
  # Minimum D2D score to accept overlap submap registrations. Submap-to-submap
  # D2D scores are much lower than keyframe loop scores; geometric aux gates
  # below still reject inconsistent transforms.
  reg_score_threshold:           0.5
  # Global loop closures must span many submaps; short-gap matches are local
  # re-observations and should not deform the long-term graph.
  min_loop_submap_gap:           6
  
  enable_traj_aux_factors:       false # extra sequential fixed-lag trajectory factor, not submap D2D
  traj_sigma_t:                  0.15
  traj_sigma_r:                  0.15
  # Result D2D must not be too far from the current pose estimate
  aux_gate_abs_trans_m:          2.0
  aux_gate_abs_rot_deg:          35.0
  # Overlap submap D2D: relative transform vs anchor geometry (strict).
  aux_gate_consistency_trans_m:  0.6
  aux_gate_consistency_rot_deg:  10.0
  # Sequential submap trajectory aux (prev_anchor -> curr_anchor): spans
  # ~submap_keyframes_per_submap keyframes; keep looser than aux_gate_* so normal
  # turns are not rejected (overlap D2D still uses aux_gate_* only).
  traj_aux_gate_abs_trans_m:          6.0
  traj_aux_gate_abs_rot_deg:          55.0
  traj_aux_gate_consistency_trans_m:  2.0
  traj_aux_gate_consistency_rot_deg:  40.0
  # When traj aux factor fails absurd-motion gates, rebuild fixed-lag smoother
  reanchor_smoother_on_traj_gate_fail: false
  # Submap GMM merge: this code currently splits submaps by odom-frame index
  # distance, so the submap size above is set to avoid large synchronous
  # prune/save bursts that stall topic publishing.
  submap_finalize_min_ready_keyframes: 3
  submap_finalize_min_ready_fraction:  0.6
  submap_finalize_max_wait_s:          4.0   # fallback if async fits lag behind

  # Submap-level loop-closure noise bounds
  submap_loop_sigma_t_min:       0.03
  submap_loop_sigma_t_max:       0.1
  submap_loop_sigma_r_min:       0.03
  submap_loop_sigma_r_max:       0.1

# ---------------------------------------------------------------------------
# when using the Webots simulation, add noise to the ground truth pose
# ---------------------------------------------------------------------------
gt_noise:
  init_wait_s:     3.0     # [s] wait before publishing
  sigma_t:         0.005    # [m] additive Gaussian noise on position
  sigma_r:         0.0000001    # [rad] additive Gaussian noise on orientation
  initial_yaw_offset_deg: 0.0 # [deg] fixed initial/body-frame yaw bias in noisy GT
  factor_sigma_t:  0.05   # [m] >= sqrt(2)*sigma_t for differenced poses
  factor_sigma_r:  0.05   # [rad]
  seed:            -1      # -1 = random seed
  jump_reject_trans_m: 0.0  # [m] 0 = off (reserved for GT outlier rejection)
  jump_reject_rot_deg: 0.0  # [deg] 0 = off

# ---------------------------------------------------------------------------
# IMU pre-integration
# ---------------------------------------------------------------------------
imu:
  enable_preintegration: true  # add IMU preintegration factors to the graph
  gravity_mps2:          9.81
  buffer_keep_s:         30.0
  acc_noise_sigma:       0.3
  gyro_noise_sigma:      0.1
  integration_sigma:     0.05
  bias_acc_rw_sigma:     0.05
  bias_gyro_rw_sigma:    0.05
  velocity_prior_sigma:  1.0
  bias_prior_sigma:      0.1

# ---------------------------------------------------------------------------
# Visualization
# ---------------------------------------------------------------------------
visualization:
  gmm_marker_sigma:           3.0    # ellipsoid scale factor, number of standard deviations
  global_gmm_markers_enable:  true   # show corrected global/submap GMM ellipsoid markers in RViz
  global_gmm_publish_period_s: 5.0   # [s]
  d2d_frame_to_frame_markers_enable: false  # show yellow sequential D2D edge trail in RViz
  d2d_frame_to_frame_text_enable:    false  # show frame-to-frame D2D score labels in RViz
  d2d_submap_overlap_text_enable:    false  # show submap-overlap D2D score labels in RViz
  d2d_loop_closure_text_enable:      true  # show loop-closure D2D score labels in RViz
  output_pose_lpf_cutoff_hz:  5.0    # [Hz] first-order low-pass published on odom_lpf (<=0 disables)
  map_cloud_publish_hz:     0.5     # accumulated raw map PointCloud2 rate
  map_cloud_max_chunks:     3000    # max smoother frames kept (oldest dropped)
  global_map_cloud_enable: true      # publish corrected GMM-derived global map cloud
  global_map_cloud_publish_hz: 0.25  # corrected global map cloud rate
  global_map_cloud_voxel_size_m: 0.10 # viz-only voxel downsample for corrected global cloud
  prune_debug_markers_enable: true   # show pruned/merged GMM component links in RViz
  prune_debug_max_markers: 2000      # cap debug markers to keep RViz responsive

# ---------------------------------------------------------------------------
# Map representation
# The persistent map is the per-submap GMM produced by GlobalPoseGraph at
# submap finalization. Pruning collapses near-duplicate components produced
# by overlapping observations of the same physical surface using optional
# R-tree candidate search, a Bhattacharyya-distance gate, and a
# keep-lower-pose-uncertainty rule.
# ---------------------------------------------------------------------------
map:
  prune_enable:           true
  prune_frame_to_frame_enable: true   # keep older source frame, drop duplicate components from newer measurements
  prune_bhatt_threshold:  3.0    # merge if D_B < this (lower = more conservative)
  prune_search_radius_m:  1.0    # AABB margin for inflation (m) on each axis
  prune_use_rtree:        true   # index components by 3D AABB; else mean-radius prefilter only
  prune_rtree_chi_sq:     9.21   # 3-DOF chi-squared for ellipsoid -> AABB (larger = looser boxes)
  prune_max_passes:       40      # retained for compatibility; union-find pruning is single-pass
  prune_cov_reg:          1.0e-6 # regularization added before any covariance inversion for stability

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
gmm_dir: "/tmp/gmmslam_gmms"
