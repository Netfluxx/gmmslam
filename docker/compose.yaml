services:
  slam:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: disal_slam
    stdin_open: true
    tty: true
    restart: unless-stopped
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - disal_slam:/root
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../python:/opt/gmmslam/python:rw
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  disal_slam:
    name: disal_slam
